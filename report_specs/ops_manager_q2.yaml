title: FY2027 Q2 Ops Manager Case Analysis

sections:
  - id: executive_summary
    title: Executive Summary
    prompt: |
      Write an executive summary of the major support case trends in this dataset.
      Focus on severity distribution, dominant root causes, customer impact, and notable operational risks.
      Use concise business language and cite counts from the available tools.

  - id: severity_analysis
    title: Severity Analysis
    prompt: |
      Analyze case volume by severity.
      Identify which severities dominate, whether high-severity cases deserve separate attention, and what this implies operationally.
      Include specific counts from the tools.

  - id: root_cause_analysis
    title: Root Cause Analysis
    prompt: |
      Analyze the most common root causes.
      Separate product defects from configuration, usage, environment, or process issues where possible.
      Include counts and explain what the root-cause mix suggests.

  - id: component_analysis
    title: Component And Triage Component Analysis
    prompt: |
      Analyze case distribution by Components and Triage Components.
      Components and Triage Components are list fields; count each item independently.
      Identify the most problematic areas and explain what patterns stand out.

  - id: customer_impact
    title: Customer Impact Themes
    prompt: |
      Identify recurring customer impact themes from subjects, AI case summaries, resolutions, account names, components, and severity.
      Highlight examples of operational pain points without overfitting to individual cases.

  - id: recommendations
    title: Recommendations
    prompt: |
      Provide practical recommendations based on the dataset.
      Include product, documentation, support process, monitoring, and triage recommendations where supported by the data.
      Make recommendations specific and action-oriented.
