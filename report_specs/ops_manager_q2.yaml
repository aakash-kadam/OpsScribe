title: FY2027 Q2 Ops Manager Case Analysis

# Optional prompt template values when scripts/run_report.py is called with
# --start-date and --end-date:
#   {start_date} - ISO formatted start datetime
#   {end_date}   - ISO formatted end datetime

sections:
  - id: executive_summary
    title: Executive Summary
    prompt: |
      Write an executive summary of the major support case trends in this dataset.
      Focus on severity distribution, dominant root causes, customer impact, and notable operational risks.
      Use concise business language and cite counts from the available tools.

  - id: severity_analysis
    title: Severity Analysis
    prompt: |
      Analyze case volume by severity from {start_date} to {end_date}
      Identify which severities dominate, whether high-severity cases deserve separate attention, and what this implies operationally.
      Include specific counts from the tools.

  - id: customer_leaderboard
    title: Customer Case LeaderBoard 
    prompt: |
      Create a customer/account leaderboard from the date range {start_date} to {end_date}.
      The table counts the number of cases opened by each customer and show the top 5 customers/accounts which have opened a case within the date range. Also add the most observed case components column with comma separated list for multiple entries, keep it at 3 component limit 

 

 
